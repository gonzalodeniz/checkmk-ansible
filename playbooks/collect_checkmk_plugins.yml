---
# Recopila los plugins de agente instalados en cada host y crea un manifiesto
# YAML en el controlador.
#
# Parámetros:
#   --limit: selecciona los hosts a explorar.
#   -e: cambia las rutas o la salida del manifiesto.
# Requisitos: Ansible, inventario, acceso SSH y las colecciones de Windows para
# hosts Windows. Las rutas estándar se pueden sobrescribir con -e.
- name: "Recopilar plugins instalados de Checkmk"
  hosts: all:!localhost
  any_errors_fatal: false
  gather_facts: false
  pre_tasks:
    # Conserva en localhost el alcance real de Ansible antes de recopilar
    # facts, incluidos los hosts que puedan resultar inaccesibles.
    - name: "Registrar hosts seleccionados"
      ansible.builtin.set_fact:
        checkmk_plugin_selected_hosts: "{{ ansible_play_hosts_all | list }}"
      delegate_to: localhost
      delegate_facts: true
      become: false
      run_once: true

    - name: "Recopilar facts del host"
      ansible.builtin.setup:
  vars:
    checkmk_linux_plugin_paths:
      - /usr/lib/check_mk_agent/plugins
      - /usr/local/lib/check_mk_agent/plugins
    checkmk_windows_plugin_paths:
      - C:\ProgramData\checkmk\agent\plugins
  tasks:
    # Inicializa un resultado para sistemas no soportados.
    - name: "Inicializar resultado de plugins"
      ansible.builtin.set_fact:
        checkmk_plugin_scan_ok: false
        checkmk_plugin_scan_status: unsupported_os
        checkmk_plugin_scan_paths: []
        checkmk_installed_plugins: []

    # Comprueba qué directorios Linux existen antes de buscar archivos.
    - name: "Linux: comprobar directorios de plugins"
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ checkmk_linux_plugin_paths }}"
      register: __checkmk_linux_plugin_paths
      when: ansible_facts.system | default('') == 'Linux'

    # Busca recursivamente archivos y calcula su checksum para el manifiesto.
    - name: "Linux: buscar plugins instalados"
      ansible.builtin.find:
        paths: >-
          {{ __checkmk_linux_plugin_paths.results
             | selectattr('stat.exists')
             | map(attribute='item')
             | list }}
        file_type: file
        recurse: true
        get_checksum: false
      register: __checkmk_linux_plugins
      when:
        - ansible_facts.system | default('') == 'Linux'
        - __checkmk_linux_plugin_paths.results
          | selectattr('stat.exists')
          | list
          | length > 0

    # Ansible Core 2.16 no permite elegir el algoritmo de checksum en find.
    # stat sí admite SHA-256, por lo que conserva el formato del manifiesto.
    - name: "Linux: calcular checksums SHA-256 de los plugins"
      ansible.builtin.stat:
        path: "{{ item.path }}"
        get_checksum: true
        checksum_algorithm: sha256
      loop: "{{ __checkmk_linux_plugins.files | default([]) }}"
      register: __checkmk_linux_plugin_checksums
      when: ansible_facts.system | default('') == 'Linux'

    # Reduce la respuesta de Ansible a los campos útiles para el consumidor.
    - name: "Linux: registrar plugins"
      ansible.builtin.set_fact:
        checkmk_plugin_scan_status: complete
        checkmk_plugin_scan_paths: >-
          {{ __checkmk_linux_plugin_paths.results
             | selectattr('stat.exists')
             | map(attribute='item')
             | list }}
        checkmk_installed_plugins: >-
          {%- set plugins = [] -%}
          {%- for result in __checkmk_linux_plugin_checksums.results | default([]) -%}
          {%-   set file = result.stat -%}
          {%-   set _ = plugins.append({
                 'name': file.path | basename,
                 'path': file.path,
                 'checksum_sha256': file.checksum | default(''),
                 'size': file.size,
                 'modified': '%d-%m-%Y %H:00' | strftime(file.mtime | int)
               }) -%}
          {%- endfor -%}
          {{ plugins }}
      when: ansible_facts.system | default('') == 'Linux'

    # Comprueba las rutas habituales del agente Windows.
    - name: "Windows: comprobar directorios de plugins"
      ansible.windows.win_stat:
        path: "{{ item }}"
      loop: "{{ checkmk_windows_plugin_paths }}"
      register: __checkmk_windows_plugin_paths
      when: ansible_facts.system | default('') == 'Win32NT'

    # Busca archivos Windows y calcula sus checksums.
    - name: "Windows: buscar plugins instalados"
      ansible.windows.win_find:
        paths: >-
          {{ __checkmk_windows_plugin_paths.results
             | selectattr('stat.exists')
             | map(attribute='item')
             | list }}
        file_type: file
        recurse: true
        get_checksum: true
        checksum_algorithm: sha256
      register: __checkmk_windows_plugins
      when:
        - ansible_facts.system | default('') == 'Win32NT'
        - __checkmk_windows_plugin_paths.results
          | selectattr('stat.exists')
          | list
          | length > 0

    # Normaliza los resultados Windows al mismo formato que Linux.
    - name: "Windows: registrar plugins"
      ansible.builtin.set_fact:
        checkmk_plugin_scan_status: complete
        checkmk_plugin_scan_paths: >-
          {{ __checkmk_windows_plugin_paths.results
             | selectattr('stat.exists')
             | map(attribute='item')
             | list }}
        checkmk_installed_plugins: >-
          {%- set plugins = [] -%}
          {%- for file in __checkmk_windows_plugins.files | default([]) -%}
          {%-   set _ = plugins.append({
                 'name': file.filename,
                 'path': file.path,
                 'checksum_sha256': file.checksum | default(''),
                 'size': file.size,
                 'modified': '%d-%m-%Y %H:00' | strftime(file.lastwritetime | int)
               }) -%}
          {%- endfor -%}
          {{ plugins }}
      when: ansible_facts.system | default('') == 'Win32NT'

    # Los hosts que llegan hasta aquí se consideran recopilados con éxito.
    # Los que fallan se mantienen en el manifiesto con campos vacíos.
    - name: "Marcar host como recopilado"
      ansible.builtin.set_fact:
        checkmk_plugin_scan_ok: true

- name: "Guardar manifiesto de plugins en el controlador"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # La salida se puede cambiar desde el lanzador con plugin_manifest_output.
    plugin_manifest_output: "{{ playbook_dir }}/../inventory/checkmk_plugins.yml"
    plugin_manifest_update: false
  tasks:
    # Asegura que la carpeta de salida existe en el controlador.
    - name: "Crear directorio de salida"
      ansible.builtin.file:
        path: "{{ plugin_manifest_output | dirname }}"
        state: directory
        mode: '0755'

    - name: "Inicializar datos del manifiesto existente"
      ansible.builtin.set_fact:
        __checkmk_existing_manifest: {}
        __checkmk_selected_hosts: >-
          {{ hostvars['localhost'].checkmk_plugin_selected_hosts | default([]) }}

    - name: "Comprobar manifiesto existente para actualización"
      ansible.builtin.stat:
        path: "{{ plugin_manifest_output }}"
      register: __checkmk_existing_manifest_file
      when: plugin_manifest_update | bool

    - name: "Exigir manifiesto existente en modo actualización"
      ansible.builtin.assert:
        that: __checkmk_existing_manifest_file.stat.exists
        fail_msg: >-
          No existe {{ plugin_manifest_output }} para actualizarlo.
      when: plugin_manifest_update | bool

    - name: "Cargar manifiesto existente"
      ansible.builtin.set_fact:
        __checkmk_existing_manifest: >-
          {{ lookup('ansible.builtin.file', plugin_manifest_output) | from_yaml }}
      when: plugin_manifest_update | bool

    - name: "Calcular hosts que se escribirán"
      ansible.builtin.set_fact:
        __checkmk_manifest_hosts: >-
          {{ (((__checkmk_existing_manifest.hosts | default({})).keys() | list)
              + __checkmk_selected_hosts) | unique | sort
             if plugin_manifest_update | bool else __checkmk_selected_hosts | sort }}

    - name: "Construir datos finales del manifiesto"
      ansible.builtin.set_fact:
        __checkmk_manifest_data: >-
          {%- set output_hosts = {} -%}
          {%- for host in __checkmk_manifest_hosts -%}
          {%-   if host in __checkmk_selected_hosts -%}
          {%-     set host_data = {
                   'scan_status': hostvars[host].checkmk_plugin_scan_status | default(''),
                   'system': (hostvars[host].ansible_facts | default({})).get('system', ''),
                   'scan_paths': hostvars[host].checkmk_plugin_scan_paths | default([]),
                   'plugins': hostvars[host].checkmk_installed_plugins | default([])
                 } -%}
          {%-   else -%}
          {%-     set host_data = (__checkmk_existing_manifest.hosts | default({})).get(host, {}) -%}
          {%-   endif -%}
          {%-   set _ = output_hosts.update({host: host_data}) -%}
          {%- endfor -%}
          {{ {'schema_version': 1, 'hosts': output_hosts} }}

    # Serializa todos los hosts; los que fallaron usan valores vacíos.
    - name: "Escribir manifiesto de plugins"
      ansible.builtin.copy:
        dest: "{{ plugin_manifest_output }}"
        mode: '0600'
        content: "{{ __checkmk_manifest_data | to_nice_yaml(indent=2, sort_keys=false) }}"
